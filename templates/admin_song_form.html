{% extends "base.html" %}
{% block title %}Add Song · Admin{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="h4 fw-semibold mb-0">Add song</h1>
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('admin') }}">Back</a>
        </div>
        <form method="post" class="vstack gap-3">
          <div>
            <label class="form-label">Title</label>
            <input class="form-control" name="title" required />
          </div>
          <div>
            <label class="form-label">Artist (optional)</label>
            <input class="form-control" name="artist" />
          </div>
          <div>
            <label class="form-label">Link (optional)</label>
            <input class="form-control" name="url" placeholder="https://open.spotify.com/..." />
          </div>
          <div>
            <label class="form-label">Note (optional)</label>
            <textarea class="form-control" name="note" rows="3"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Save</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
