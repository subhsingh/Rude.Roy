{% extends "base.html" %}
{% block title %}Login · For You{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card p-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h2 class="h4 fw-semibold mb-0">Login</h2>
          <span class="badge badge-soft rounded-pill px-3 py-2">Login first</span>
        </div>
        <div class="muted mb-3">Because this is for her. Not for the world.</div>
        <form method="post" class="vstack gap-3">
          <div>
            <label class="form-label">Username</label>
            <input class="form-control" name="username" autocomplete="username" required />
          </div>
          <div>
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Sign in</button>
          <div class="small muted">
            Default: <code>Sathee.Singh</code> / <code>Loveusubham</code> (change it in Render env or Admin → Account).
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
